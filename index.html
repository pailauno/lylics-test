<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Lyrics Space</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { slate: { 850: '#1e293b', 950: '#020617' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-slate-900 text-slate-400">
            <div class="text-center">
                <p class="text-xl font-bold animate-pulse text-violet-400">🎵 VIBE LYRICS 로딩 중...</p>
                <p class="text-xs mt-2 text-slate-600">화면이 계속 멈춰있다면 인터넷 연결을 확인해 주세요.</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // Firebase 설정 및 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyCpTPlU1_6ddMmU_vYOh1OdlXvc9jOTvv1Y",
            authDomain: "lylics-test.firebaseapp.com",
            projectId: "lylics-test",
            storageBucket: "lylics-test.firebasestorage.app",
            messagingSenderId: "267755688321",
            appId: "1:267755688321:web:a5c2cc0fc76f481bf2d880"
        };

        // 안전하게 인스턴스 초기화 유도
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 이모지 가상 아이콘 정의
        const LucideIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                Music: "🎵", Plus: "➕", LogIn: "🔑", LogOut: "🚪", 
                BookOpen: "📖", Heart: "❤️", Clock: "🕒", Github: "🐙", 
                Layers: "🥞", Sparkles: "✨", Search: "🔍", AlertCircle: "⚠️", 
                CheckCircle2: "✅", Trash2: "🗑️"
            };
            return <span className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{icons[name] || "•"}</span>;
        };

        const Music = (p) => <LucideIcon name="Music" {...p} />;
        const Heart = (p) => <LucideIcon name="Heart" {...p} />;
        const CheckCircle2 = (p) => <LucideIcon name="CheckCircle2" {...p} />;

        function App() {
            const [user, setUser] = React.useState(null);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [lyrics, setLyrics] = React.useState([]);
            const [lyricsLoading, setLyricsLoading] = React.useState(true);
            
            const [songTitle, setSongTitle] = React.useState('');
            const [artist, setArtist] = React.useState('');
            const [lyricsText, setLyricsText] = React.useState('');
            const [tags, setTags] = React.useState('');
            const [searchQuery, setSearchQuery] = React.useState('');
            const [selectedLyric, setSelectedLyric] = React.useState(null);

            const [authMode, setAuthMode] = React.useState('login'); 
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [notification, setNotification] = React.useState(null);
            const [isSubmitLoading, setIsSubmitLoading] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('explore');

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            // 1. 유저 인증 상태 감시 및 자동 익명 세션 활성화
            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (!currentUser) {
                        // 세션 유실 방지를 위해 즉시 익명 계정 발급 연동
                        auth.signInAnonymously().catch(e => console.error("익명 로그인 대기"));
                    } else {
                        setUser(currentUser);
                        setAuthLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. 실시간 Firestore 클라우드 데이터베이스 수신 동기화
            React.useEffect(() => {
                if (!user) return;

                const lyricsCollection = db.collection('artifacts').doc('lylics-test').collection('public').doc('data').collection('lyrics');
                
                setLyricsLoading(true);
                const unsubscribe = lyricsCollection.onSnapshot((snapshot) => {
                    const items = [];
                    snapshot.forEach((doc) => {
                        items.push({ id: doc.id, ...doc.data() });
                    });
                    // 등록된 시간 역순(최신순) 정렬
                    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setLyrics(items);
                    setLyricsLoading(false);
                }, (error) => {
                    console.error("DB 연동에 실패했습니다:", error);
                    setLyricsLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // 이메일 회원가입 처리
            const handleEmailSignUp = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    setAuthLoading(true);
                    await auth.createUserWithEmailAndPassword(email, password);
                    showNotification("🚀 회원가입 성공! 자동 로그인되었습니다.");
                    setEmail(''); setPassword('');
                } catch (err) {
                    setAuthError("가입 실패: 이미 있는 이메일이거나 비밀번호가 너무 취약합니다.");
                } finally { setAuthLoading(false); }
            };

            // 이메일 로그인 처리
            const handleEmailSignIn = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    setAuthLoading(true);
                    await auth.signInWithEmailAndPassword(email, password);
                    showNotification("🔓 성공적으로 로그인되었습니다.");
                    setEmail(''); setPassword('');
                } catch (err) {
                    setAuthError("이메일 또는 비밀번호가 올바르지 않습니다.");
                } finally { setAuthLoading(false); }
            };

            // 로그아웃 처리
            const handleSignOut = async () => {
                try {
                    await auth.signOut();
                    setSelectedLyric(null);
                    showNotification("로그아웃 되었습니다.");
                } catch (err) { console.error(err); }
            };

            // 가사 등록 처리
            const handleSubmitLyrics = async (e) => {
                e.preventDefault();
                if (!user) return;
                if (!songTitle.trim() || !artist.trim() || !lyricsText.trim()) return;

                setIsSubmitLoading(true);
                try {
                    const lyricsCollection = db.collection('artifacts').doc('lylics-test').collection('public').doc('data').collection('lyrics');
                    await lyricsCollection.add({
                        title: songTitle.trim(),
                        artist: artist.trim(),
                        lyrics: lyricsText.trim(),
                        tags: tags.split(',').map(t => t.trim()).filter(t => t !== ''),
                        createdAt: Date.now(),
                        userId: user.uid,
                        userEmail: user.isAnonymous ? "익명 작사가" : (user.email || "일반 유저"),
                        likes: 0,
                        likedBy: []
                    });

                    setSongTitle(''); setArtist(''); setLyricsText(''); setTags('');
                    showNotification("🎶 가사가 클라우드 서버에 안전하게 업로드되었습니다!");
                    setActiveTab('explore');
                } catch (err) {
                    showNotification("업로드 권한이 없습니다.", "error");
                } finally { setIsSubmitLoading(false); }
            };

            // 가사 데이터 삭제 처리
            const handleDeleteLyrics = async (id, writerId) => {
                if (user.uid !== writerId) {
                    showNotification("본인이 등록한 가사만 삭제할 수 있습니다.", "error");
                    return;
                }
                if (!confirm("이 가사를 데이터베이스에서 영구히 삭제하시겠습니까?")) return;

                try {
                    const docRef = db.collection('artifacts').doc('lylics-test').collection('public').doc('data').collection('lyrics').doc(id);
                    await docRef.delete();
                    showNotification("가사가 완전히 삭제되었습니다.");
                    if (selectedLyric?.id === id) setSelectedLyric(null);
                } catch (err) { showNotification("삭제 실패", "error"); }
            };

            // 좋아요 토글 처리
            const handleLikeLyrics = async (lyricItem, e) => {
                e.stopPropagation();
                if (!user) return;

                try {
                    const docRef = db.collection('artifacts').doc('lylics-test').collection('public').doc('data').collection('lyrics').doc(lyricItem.id);
                    const likedBy = lyricItem.likedBy || [];
                    const isAlreadyLiked = likedBy.includes(user.uid);
                    
                    const updatedLikedBy = isAlreadyLiked ? likedBy.filter(u => u !== user.uid) : [...likedBy, user.uid];
                    const newLikesCount = isAlreadyLiked ? Math.max(0, (lyricItem.likes || 0) - 1) : (lyricItem.likes || 0) + 1;

                    await docRef.update({
                        likes: newLikesCount,
                        likedBy: updatedLikedBy
                    });

                    showNotification(isAlreadyLiked ? "좋아요를 취소했습니다." : "가사에 좋아요를 보냈습니다! ❤️");
                } catch (err) { console.error(err); }
            };

            const filteredLyrics = lyrics.filter(item => {
                const s = searchQuery.toLowerCase();
                return item.title.toLowerCase().includes(s) || item.artist.toLowerCase().includes(s) || item.lyrics.toLowerCase().includes(s);
            });

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col">
                    {notification && (
                        <div className="fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-2xl bg-violet-600 text-white font-bold text-sm">
                            <CheckCircle2 /> <span>{notification.message}</span>
                        </div>
                    )}

                    <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveTab('explore'); setSelectedLyric(null); }}>
                                <div className="p-2 bg-gradient-to-tr from-violet-600 to-indigo-500 rounded-xl shadow-lg">
                                    <Music className="text-white" />
                                </div>
                                <span className="text-xl font-black bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent">
                                    VIBE LYRICS
                                </span>
                            </div>

                            <nav className="flex items-center gap-1 bg-slate-900 p-1 rounded-xl border border-slate-800">
                                <button onClick={() => { setActiveTab('explore'); setSelectedLyric(null); }} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'explore' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>가사 둘러보기</button>
                                <button onClick={() => setActiveTab('submit')} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'submit' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>가사 적기</button>
                            </nav>

                            <div className="text-sm font-medium">
                                {authLoading ? <span className="text-slate-500">연결 중...</span> : user ? (
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs text-violet-400 font-bold">{user.isAnonymous ? "🎨 익명 접속자" : user.email}</span>
                                        {!user.isAnonymous && <button onClick={handleSignOut} className="px-2 py-1 text-xs bg-slate-800 rounded border border-slate-700 hover:text-rose-400">로그아웃</button>}
                                    </div>
                                ) : null}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
                        {activeTab === 'explore' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className={selectedLyric ? 'lg:col-span-5 flex flex-col gap-6' : 'lg:col-span-8 flex flex-col gap-6'}>
                                    <div className="flex flex-col sm:flex-row justify-between gap-4 items-center">
                                        <h2 className="text-2xl font-black text-white">📖 실시간 공유 가사 ({lyrics.length}곡)</h2>
                                        <input type="text" placeholder="제목, 가수, 가사 검색..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="bg-slate-950/60 border border-slate-800 rounded-xl py-2 px-4 text-sm text-slate-300 focus:outline-none focus:border-violet-500 w-full sm:w-64" />
                                    </div>

                                    {lyricsLoading ? (
                                        <div className="text-center py-12 text-slate-500">서버 데이터 동기화 중...</div>
                                    ) : (
                                        <div className={`grid grid-cols-1 ${selectedLyric ? 'grid-cols-1' : 'md:grid-cols-2'} gap-4`}>
                                            {filteredLyrics.map((lyric) => (
                                                <div key={lyric.id} onClick={() => setSelectedLyric(lyric)} className={`p-5 rounded-2xl border bg-slate-950/40 border-slate-800 hover:border-slate-700 cursor-pointer flex flex-col justify-between h-52 transition-all ${selectedLyric?.id === lyric.id ? 'border-violet-500 bg-slate-950/80' : ''}`}>
                                                    <div>
                                                        <div className="flex justify-between text-[10px] text-slate-500 mb-1">
                                                            <span>👤 {lyric.userEmail}</span>
                                                        </div>
                                                        <h3 className="font-bold text-lg text-slate-100 line-clamp-1">{lyric.title}</h3>
                                                        <p className="text-sm text-slate-400 font-semibold mb-2">by {lyric.artist}</p>
                                                        <p className="text-xs text-slate-500 line-clamp-2 italic">"{lyric.lyrics}"</p>
                                                    </div>
                                                    <div className="flex items-center justify-between border-t border-slate-800/60 pt-3 mt-4">
                                                        <div className="flex gap-1">
                                                            {lyric.tags && lyric.tags.map((tag, i) => <span key={i} className="text-[10px] px-2 py-0.5 bg-slate-900 text-slate-400 rounded">#{tag}</span>)}
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <button onClick={(e) => handleLikeLyrics(lyric, e)} className="flex items-center gap-1 px-2 py-0.5 rounded bg-slate-900 text-slate-400 hover:text-rose-400 border border-slate-800 text-xs">
                                                                <Heart /> {lyric.likes || 0}
                                                            </button>
                                                            {user && user.uid === lyric.userId && (
                                                                <button onClick={(e) => { e.stopPropagation(); handleDeleteLyrics(lyric.id, lyric.userId); }} className="text-slate-600 hover:text-rose-400 text-xs font-semibold pl-1">삭제</button>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {selectedLyric && (
                                    <div className="lg:col-span-7 bg-slate-950/60 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between shadow-2xl sticky top-24">
                                        <div>
                                            <div className="flex justify-between items-start border-b border-slate-800 pb-4 mb-4">
                                                <div>
                                                    <h2 className="text-2xl font-black text-white">{selectedLyric.title}</h2>
                                                    <p className="text-base text-violet-400 font-bold">아티스트: {selectedLyric.artist}</p>
                                                    <p className="text-xs text-slate-500 mt-1">게시글 작성 계정: {selectedLyric.userEmail}</p>
                                                </div>
                                                <button onClick={() => setSelectedLyric(null)} className="px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-xl text-slate-400 text-xs font-semibold hover:text-slate-200">닫기</button>
                                            </div>
                                            <p className="text-slate-300 leading-relaxed whitespace-pre-line text-base italic bg-slate-900/40 p-6 rounded-2xl border border-slate-900 shadow-inner max-h-[50vh] overflow-y-auto">
                                                {selectedLyric.lyrics}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {!selectedLyric && user && user.isAnonymous && (
                                    <div className="lg:col-span-4 bg-slate-950/60 border border-slate-800 rounded-3xl p-6 shadow-2xl h-fit">
                                        <h3 className="text-sm font-bold mb-3 text-white">🔑 고유 회원 로그인/가입</h3>
                                        {authError && <p className="text-xs text-rose-400 mb-2 font-medium">⚠️ {authError}</p>}
                                        <form onSubmit={authMode === 'login' ? handleEmailSignIn : handleEmailSignUp} className="space-y-3">
                                            <input type="email" placeholder="이메일 주소" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-200 focus:outline-none focus:border-violet-5
