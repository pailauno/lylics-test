<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Lyrics Space</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { slate: { 850: '#1e293b', 950: '#020617' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="root"></div>

    <script type="text/babel">
        // [Firebase 설정]
        const firebaseConfig = {
            apiKey: "AIzaSyCpTPlU1_6ddMmU_vYOh1OdlXvc9jOTvv1Y",
            authDomain: "lylics-test.firebaseapp.com",
            projectId: "lylics-test",
            storageBucket: "lylics-test.firebasestorage.app",
            messagingSenderId: "267755688321",
            appId: "1:267755688321:web:a5c2cc0fc76f481bf2d880",
            measurementId: "G-G7SD6BFS5X"
        };

        // 안전한 초기화 예외 처리
        let auth = null;
        let db = null;
        let firebaseInitialized = false;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();
            firebaseInitialized = true;
        } catch (e) {
            console.error("Firebase 초기화 에러:", e);
        }

        // 아이콘 리스트
        const LucideIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = { Music: "🎵", Plus: "➕", Heart: "❤️", CheckCircle2: "✅", AlertCircle: "⚠️" };
            return <span className={className} style={{ display: 'inline-flex', alignItems: 'center' }}>{icons[name] || "•"}</span>;
        };
        const Music = (p) => <LucideIcon name="Music" {...p} />;
        const Heart = (p) => <LucideIcon name="Heart" {...p} />;
        const CheckCircle2 = (p) => <LucideIcon name="CheckCircle2" {...p} />;
        const AlertCircle = (p) => <LucideIcon name="AlertCircle" {...p} />;

        function App() {
            const [user, setUser] = React.useState(null);
            const [lyrics, setLyrics] = React.useState([]);
            const [lyricsLoading, setLyricsLoading] = React.useState(false);
            
            const [songTitle, setSongTitle] = React.useState('');
            const [artist, setArtist] = React.useState('');
            const [lyricsText, setLyricsText] = React.useState('');
            const [tags, setTags] = React.useState('');
            const [searchQuery, setSearchQuery] = React.useState('');
            const [selectedLyric, setSelectedLyric] = React.useState(null);

            const [authMode, setAuthMode] = React.useState('signup'); // 가입 편의를 위해 초기값을 회원가입으로 변경
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [notification, setNotification] = React.useState(null);
            const [isSubmitLoading, setIsSubmitLoading] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('explore');

            const showNotification = (message) => {
                setNotification(message);
                setTimeout(() => setNotification(null), 3000);
            };

            // 1. 유저 인증 상태 감시
            React.useEffect(() => {
                if (!auth) return;
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            // 2. 가사 목록 실시간 수신
            React.useEffect(() => {
                if (!db) return;
                setLyricsLoading(true);
                const lyricsCollection = db.collection('lyrics');
                const unsubscribe = lyricsCollection.onSnapshot((snapshot) => {
                    const items = [];
                    snapshot.forEach((doc) => {
                        items.push({ id: doc.id, ...doc.data() });
                    });
                    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setLyrics(items);
                    setLyricsLoading(false);
                }, (error) => {
                    setLyricsLoading(false);
                    setAuthError("데이터 로드 실패: 파이어베이스 규칙 또는 설정을 확인하세요.");
                });

                return () => unsubscribe();
            }, []);

            const getFriendlyErrorMessage = (error) => {
                switch (error.code) {
                    case 'auth/api-key-not-valid': return 'Firebase API Key 정보가 맞지 않습니다. 콘솔 앱 설정을 확인하세요.';
                    case 'auth/weak-password': return '비밀번호가 너무 짧습니다. (최조 6자 이상 필요)';
                    case 'auth/email-already-in-use': return '이미 가입된 메일 주소입니다. 로그인으로 진행하세요.';
                    case 'auth/invalid-email': return '이메일 주소 형식이 올바르지 않습니다.';
                    case 'auth/wrong-password': return '비밀번호가 올바르지 않습니다.';
                    case 'auth/user-not-found': return '가입되지 않은 회원 이메일입니다.';
                    default: return error.message;
                }
            };

            const handleEmailSignUp = async (e) => {
                e.preventDefault();
                if (!auth) return alert("Firebase 인증 모듈이 로드되지 않았습니다.");
                setAuthError('');
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                    showNotification("🚀 회원가입 성공 및 로그인 완료!");
                    setEmail(''); setPassword('');
                } catch (err) { setAuthError(getFriendlyErrorMessage(err)); }
            };

            const handleEmailSignIn = async (e) => {
                e.preventDefault();
                if (!auth) return alert("Firebase 인증 모듈이 로드되지 않았습니다.");
                setAuthError('');
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    showNotification("🔓 로그인 성공!");
                    setEmail(''); setPassword('');
                } catch (err) { setAuthError(getFriendlyErrorMessage(err)); }
            };

            const handleSignOut = async () => {
                if (!auth) return;
                await auth.signOut();
                setSelectedLyric(null);
                setActiveTab('explore');
                showNotification("로그아웃 되었습니다.");
            };

            const handleSubmitLyrics = async (e) => {
                e.preventDefault();
                if (!db || !user) return;
                if (!songTitle.trim() || !artist.trim() || !lyricsText.trim()) return;

                setIsSubmitLoading(true);
                try {
                    await db.collection('lyrics').add({
                        title: songTitle.trim(),
                        artist: artist.trim(),
                        lyrics: lyricsText.trim(),
                        tags: tags.split(',').map(t => t.trim()).filter(t => t !== ''),
                        createdAt: Date.now(),
                        userId: user.uid,
                        userEmail: user.email, 
                        likes: 0,
                        likedBy: []
                    });
                    setSongTitle(''); setArtist(''); setLyricsText(''); setTags('');
                    showNotification("🎶 가사가 등록되었습니다!");
                    setActiveTab('explore');
                } catch (err) { showNotification("저장 실패"); }
                finally { setIsSubmitLoading(false); }
            };

            const handleDeleteLyrics = async (id, writerId) => {
                if (!db || !user || user.uid !== writerId) return;
                if (!confirm("정말 삭제하시겠습니까?")) return;
                try {
                    await db.collection('lyrics').doc(id).delete();
                    showNotification("가사가 삭제되었습니다.");
                    if (selectedLyric?.id === id) setSelectedLyric(null);
                } catch (err) { alert("삭제 실패"); }
            };

            const handleLikeLyrics = async (lyricItem, e) => {
                e.stopPropagation();
                if (!db || !user) {
                    showNotification("🔒 좋아요는 로그인 후 이용 가능합니다.");
                    return;
                }
                try {
                    const docRef = db.collection('lyrics').doc(lyricItem.id);
                    const likedBy = lyricItem.likedBy || [];
                    const isAlreadyLiked = likedBy.includes(user.uid);
                    await docRef.update({
                        likes: isAlreadyLiked ? Math.max(0, (lyricItem.likes || 0) - 1) : (lyricItem.likes || 0) + 1,
                        likedBy: isAlreadyLiked ? likedBy.filter(u => u !== user.uid) : [...likedBy, user.uid]
                    });
                } catch (err) { console.error(err); }
            };

            const filteredLyrics = lyrics.filter(item => {
                const s = searchQuery.toLowerCase();
                return item.title.toLowerCase().includes(s) || item.artist.toLowerCase().includes(s);
            });

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col">
                    {notification && (
                        <div className="fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-2xl bg-indigo-600 text-white font-bold text-sm">
                            <CheckCircle2 /> <span>{notification}</span>
                        </div>
                    )}

                    <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveTab('explore'); setSelectedLyric(null); }}>
                                <div className="p-2 bg-gradient-to-tr from-violet-600 to-indigo-500 rounded-xl shadow-lg">
                                    <Music className="text-white" />
                                </div>
                                <span className="text-xl font-black bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent">VIBE LYRICS</span>
                            </div>

                            <nav className="flex items-center gap-1 bg-slate-900 p-1 rounded-xl border border-slate-800">
                                <button onClick={() => { setActiveTab('explore'); setSelectedLyric(null); }} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'explore' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>둘러보기</button>
                                <button onClick={() => setActiveTab('submit')} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'submit' ? 'bg-slate-800 text-white' : 'text-slate-400'}`}>가사 쓰기</button>
                            </nav>

                            <div className="text-sm font-medium">
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs text-emerald-400 font-bold">🟢 {user.email}</span>
                                        <button onClick={handleSignOut} className="px-2 py-1 text-xs bg-slate-800 rounded border border-slate-700 hover:text-rose-400">로그아웃</button>
                                    </div>
                                ) : <span className="text-xs text-slate-500 font-bold">⚫ 방문자 모드</span>}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
                        {!firebaseInitialized && (
                            <div className="mb-6 p-4 bg-amber-500/10 border border-amber-500/30 text-amber-400 rounded-2xl text-xs font-semibold">
                                ⚠️ Firebase 연동에 문제가 발견되었습니다. 스크립트 순서나 콘솔 키 값을 다시 확인해 주세요.
                            </div>
                        )}

                        {activeTab === 'explore' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className={selectedLyric ? 'lg:col-span-5 flex flex-col gap-6' : 'lg:col-span-8 flex flex-col gap-6'}>
                                    <div className="flex flex-col sm:flex-row justify-between gap-4 items-center">
                                        <h2 className="text-xl font-black text-white">📖 공유 가사 리스트 ({lyrics.length})</h2>
                                        <input type="text" placeholder="제목, 가수 검색..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="bg-slate-950/60 border border-slate-800 rounded-xl py-2 px-4 text-sm text-slate-300 w-full sm:w-64 focus:outline-none" />
                                    </div>

                                    {lyricsLoading ? (
                                        <div className="text-center py-12 text-slate-500">데이터 연동 확인 중...</div>
                                    ) : lyrics.length === 0 ? (
                                        <div className="text-center py-12 text-slate-500 bg-slate-950/20 rounded-2xl border border-slate-800">등록된 가사가 없습니다. 우측 메뉴에서 가입 후 첫 가사를 작성해 보세요!</div>
                                    ) : (
                                        <div className={`grid grid-cols-1 ${selectedLyric ? 'grid-cols-1' : 'md:grid-cols-2'} gap-4`}>
                                            {filteredLyrics.map((lyric) => (
                                                <div key={lyric.id} onClick={() => setSelectedLyric(lyric)} className={`p-5 rounded-2xl border bg-slate-950/40 border-slate-800 hover:border-slate-700 cursor-pointer flex flex-col justify-between h-52 transition-all ${selectedLyric?.id === lyric.id ? 'border-violet-500 bg-slate-950/80' : ''}`}>
                                                    <div>
                                                        <p className="text-[10px] text-violet-400 mb-1 font-semibold">👤 {lyric.userEmail || "공유 멤버"}</p>
                                                        <h3 className="font-bold text-lg text-slate-100 line-clamp-1">{lyric.title}</h3>
                                                        <p className="text-sm text-slate-400 font-semibold mb-2">by {lyric.artist}</p>
                                                        <p className="text-xs text-slate-500 line-clamp-2 italic">"{lyric.lyrics}"</p>
                                                    </div>
                                                    <div className="flex items-center justify-between border-t border-slate-800/60 pt-3 mt-4">
                                                        <div className="flex gap-1">
                                                            {lyric.tags && lyric.tags.map((tag, i) => <span key={i} className="text-[10px] px-2 py-0.5 bg-slate-900 text-slate-400 rounded">#{tag}</span>)}
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <button onClick={(e) => handleLikeLyrics(lyric, e)} className="flex items-center gap-1 px-2 py-0.5 rounded bg-slate-900 text-slate-400 hover:text-rose-400 border border-slate-800 text-xs">
                                                                <Heart /> {lyric.likes || 0}
                                                            </button>
                                                            {user && user.uid === lyric.userId && (
                                                                <button onClick={(e) => { e.stopPropagation(); handleDeleteLyrics(lyric.id, lyric.userId); }} className="text-slate-600 hover:text-rose-400 text-xs">삭제</button>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {selectedLyric && (
                                    <div className="lg:col-span-7 bg-slate-950/60 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between shadow-2xl sticky top-24">
                                        <div>
                                            <div className="flex justify-between items-start border-b border-slate-800 pb-4 mb-4">
                                                <div>
                                                    <h2 className="text-2xl font-black text-white">{selectedLyric.title}</h2>
                                                    <p className="text-base text-violet-400 font-bold">아티스트: {selectedLyric.artist}</p>
                                                </div>
                                                <button onClick={() => setSelectedLyric(null)} className="px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-xl text-slate-400 text-xs hover:text-slate-200">닫기</button>
                                            </div>
                                            <p className="text-slate-300 leading-relaxed whitespace-pre-line text-base italic bg-slate-900/40 p-6 rounded-2xl border border-slate-900 max-h-[50vh] overflow-y-auto">
                                                {selectedLyric.lyrics}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {/* 우측 패널 (메인 대시보드 진입 시 즉시 렌더링됨) */}
                                {!selectedLyric && !user && (
                                    <div className="lg:col-span-4 bg-slate-950/60 border border-slate-800 rounded-3xl p-6 shadow-2xl h-fit">
                                        <h3 className="text-sm font-bold mb-3 text-white">🔑 {authMode === 'login' ? '가사 노트 로그인' : '신규 계정 회원가입'}</h3>
                                        {authError && <div className="p-3 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs rounded-xl mb-3 font-medium whitespace-pre-line">⚠️ {authError}</div>}
                                        <form onSubmit={authMode === 'login' ? handleEmailSignIn : handleEmailSignUp} className="space-y-3">
                                            <input type="email" placeholder="이메일 주소" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-200 focus:outline-none focus:border-violet-500" required />
                                            <input type="password" placeholder="비밀번호 (6자 이상)" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-lg p-2.5 text-xs text-slate-200 focus:outline-none focus:border-violet-500" required />
                                            <button type="submit" className="w-full py-2.5 bg-violet-600 hover:bg-violet-500 text-white text-xs font-bold rounded-lg shadow-md transition-colors">{authMode === 'login' ? "로그인" : "회원가입 완료하기"}</button>
                                        </form>
                                        <p className="text-center text-[11px] text-slate-500 mt-4">
                                            {authMode === 'login' ? "아직 계정이 없으신가요?" : "이미 아이디가 있으신가요?"}
                                            <button onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setAuthError(''); }} className="text-violet-400 ml-1 hover:underline font-bold">{authMode === 'login' ? "가입하기" : "로그인하기"}</button>
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'submit' && (
                            <div className="max-w-2xl mx-auto">
                                {user ? (
                                    <div className="bg-slate-950/60 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                                        <h2 className="text-xl font-black text-white mb-6">✨ 나만의 가사 노트 적기</h2>
                                        <form onSubmit={handleSubmitLyrics} className="space-y-4">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <input type="text" required placeholder="노래 곡명" value={songTitle} onChange={(e) => setSongTitle(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none" />
                                                <input type="text" required placeholder="아티스트" value={artist} onChange={(e) => setArtist(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none" />
                                            </div>
                                            <textarea required rows={6} placeholder="가사를 입력하세요. 클라우드 서버에 실시간 저장됩니다." value={lyricsText} onChange={(e) => setLyricsText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none" />
                                            <input type="text" placeholder="태그 (쉼표로 구분 예: 감성, 신남)" value={tags} onChange={(e) => setTags(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none" />
                                            <button type="submit" disabled={isSubmitLoading} className="w-full py-3 bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-bold rounded-xl shadow-lg">
                                                {isSubmitLoading ? "저장 중..." : "공유 수첩에 올리기"}
                                            </button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="bg-slate-950/60 border border-slate-800 rounded-3xl p-8 text-center shadow-2xl py-16">
                                        <div className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-800">
                                            <AlertCircle className="text-violet-400 w-8 h-8" />
                                        </div>
                                        <h2 className="text-xl font-black text-white mb-2">로그인이 필요한 기능입니다</h2>
                                        <p className="text-sm text-slate-400 mb-6 max-w-sm mx-auto">나만의 멋진 가사를 적고 저장하려면 먼저 이메일 가입 또는 로그인을 완료해 주세요.</p>
                                        
                                        <div className="max-w-xs mx-auto bg-slate-900 p-6 rounded-2xl border border-slate-800 text-left">
                                            <h3 className="text-xs font-bold mb-3 text-slate-300 text-center">🔑 {authMode === 'login' ? '로그인' : '신규 회원가입'}</h3>
                                            {authError && <div className="p-2.5 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs rounded-xl mb-3 font-medium">⚠️ {authError}</div>}
                                            <form onSubmit={authMode === 'login' ? handleEmailSignIn : handleEmailSignUp} className="space-y-2">
                                                <input type="email" placeholder="이메일" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-slate-200 focus:outline-none" required />
                                                <input type="password" placeholder="비밀번호 (6자 이상)" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-slate-200 focus:outline-none" required />
                                                <button type="submit" className="w-full py-2 bg-violet-600 hover:bg-violet-500 text-white text-xs font-bold rounded-lg">{authMode === 'login' ? "로그인" : "회원가입 완료하기"}</button>
                                            </form>
                                            <p className="text-center text-[10px] text-slate-500 mt-3">
                                                {authMode === 'login' ? "처음 오셨나요?" : "이미 계정이 있나요?"}
                                                <button onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setAuthError(''); }} className="text-violet-400 ml-1 hover:underline font-bold">{authMode === 'login' ? "회원가입" : "로그인하기"}</button>
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
